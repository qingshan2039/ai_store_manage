openapi: 3.0.3
info:
  title: AI Store Manage - 用户与部门管理 API
  description: |
    WMS 仓储管理系统 — 用户与部门模块 API 契约。

    本契约基于 `sys_user` 表字段设计，遵循 Contract First 原则，
    定义用户 CRUD、状态变更、密码重置等接口。

    **设计原则：**
    - RESTful 风格，资源路径统一为 `/api/users`
    - 严格区分数据库字段与 API 暴露字段
    - `password` 仅出现在写入类请求，永不出现在响应中
    - `deleted` 为内部逻辑删除标记，不暴露给业务接口
    - 枚举字段（gender、status）明确约束取值范围
    - 统一错误响应结构，便于前端统一处理
  version: 1.0.0
  contact:
    name: AI Store Manage Team

servers:
  - url: http://localhost:8080
    description: 本地开发环境

tags:
  - name: 用户管理
    description: 用户 CRUD、状态管理、密码管理
  - name: 部门管理
    description: 部门 CRUD、状态管理（扁平结构，按类型分类）
  - name: 顾客管理
    description: 顾客（客户公司）CRUD、状态管理

paths:
  /api/users:
    post:
      tags:
        - 用户管理
      summary: 创建用户
      description: |
        管理员创建新用户。`employeeNo` 和 `username` 创建后不可修改。
        密码使用 BCrypt 加密存储。创建成功后返回完整用户详情。
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: 用户创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation_error:
                  summary: 参数校验失败
                  value:
                    code: "VALIDATION_ERROR"
                    message: "请求参数校验失败"
                    details:
                      - field: "username"
                        message: "用户名长度必须在4-64个字符之间"
        '409':
          description: 资源冲突（用户名或工号已存在）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                username_conflict:
                  summary: 用户名已存在
                  value:
                    code: "DUPLICATE_USERNAME"
                    message: "用户名已存在"
                employeeNo_conflict:
                  summary: 工号已存在
                  value:
                    code: "DUPLICATE_EMPLOYEE_NO"
                    message: "工号已存在"

    get:
      tags:
        - 用户管理
      summary: 查询用户列表
      description: |
        分页查询用户列表，支持多条件筛选和关键词搜索。
        列表响应使用 `UserSummary` 精简结构，不包含备注等详情字段。
        `keyword` 可同时模糊匹配 `name`、`employeeNo`、`phoneNumber`。
      operationId: listUsers
      parameters:
        - name: keyword
          in: query
          description: 关键词搜索（模糊匹配姓名、工号、手机号）
          required: false
          schema:
            type: string
            maxLength: 64
            example: "张"
        - name: employeeNo
          in: query
          description: 工号筛选（精确或前缀匹配）
          required: false
          schema:
            type: string
            maxLength: 32
            example: "WH-2026"
        - name: name
          in: query
          description: 姓名筛选（模糊匹配）
          required: false
          schema:
            type: string
            maxLength: 64
            example: "张三"
        - name: phoneNumber
          in: query
          description: 手机号筛选（精确匹配）
          required: false
          schema:
            type: string
            maxLength: 20
            example: "13800138000"
        - name: status
          in: query
          description: 账号状态筛选（0=禁用，1=启用）
          required: false
          schema:
            type: integer
            enum: [0, 1]
            example: 1
        - name: departmentId
          in: query
          description: 部门 ID 筛选
          required: false
          schema:
            type: integer
            format: int64
            example: 1
        - name: jobTitle
          in: query
          description: 职位筛选（模糊匹配）
          required: false
          schema:
            type: string
            maxLength: 64
            example: "仓管员"
        - name: gender
          in: query
          description: 性别筛选（0=未知，1=男，2=女）
          required: false
          schema:
            type: integer
            enum: [0, 1, 2]
            example: 1
        - name: createdAtStart
          in: query
          description: 创建时间起始（包含），格式 yyyy-MM-dd HH:mm:ss
          required: false
          schema:
            type: string
            format: date-time
            example: "2026-01-01T00:00:00"
        - name: createdAtEnd
          in: query
          description: 创建时间截止（包含），格式 yyyy-MM-dd HH:mm:ss
          required: false
          schema:
            type: string
            format: date-time
            example: "2026-12-31T23:59:59"
        - name: page
          in: query
          description: 页码，从 1 开始
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: pageSize
          in: query
          description: 每页条数
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '400':
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{id}:
    get:
      tags:
        - 用户管理
      summary: 查询用户详情
      description: 根据用户 ID 查询完整用户信息。返回 `User` 完整结构，包含备注、隐私设置等详情字段。
      operationId: getUserById
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_found:
                  summary: 用户不存在
                  value:
                    code: "USER_NOT_FOUND"
                    message: "用户不存在"

    put:
      tags:
        - 用户管理
      summary: 更新用户信息
      description: |
        更新用户基本信息。`employeeNo`、`username` 创建后不可修改。
        密码通过独立接口重置，不在此接口中处理。
        更新成功后返回完整用户详情。
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - 用户管理
      summary: 删除用户
      description: |
        逻辑删除用户（将 `deleted` 标记为已删除）。删除后用户数据保留，
        但不会出现在正常查询结果中。`username` 和 `employeeNo` 可被新用户复用。
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: 删除成功（无返回内容）
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{id}/status:
    patch:
      tags:
        - 用户管理
      summary: 变更用户状态
      description: |
        启用或禁用用户账号。独立接口设计避免通过通用更新接口意外修改状态，
        便于后续对接审批流或添加状态变更日志。
      operationId: updateUserStatus
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserStatusRequest'
      responses:
        '200':
          description: 状态变更成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{id}/password:
    put:
      tags:
        - 用户管理
      summary: 重置用户密码
      description: |
        管理员重置指定用户的密码。密码使用 BCrypt 加密存储。
        独立接口设计确保密码变更操作可追溯，不与普通信息更新混淆。
      operationId: resetUserPassword
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetUserPasswordRequest'
      responses:
        '204':
          description: 密码重置成功（无返回内容）
        '400':
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────────────────────────
  # 部门管理接口
  # ──────────────────────────────────────────────
  /api/departments:
    post:
      tags:
        - 部门管理
      summary: 创建部门
      description: |
        创建新部门。`code` 部门编码创建后不可修改，全局唯一。
        `type` 为部门类型枚举（仓管/运输/销售/生产/OFFICE/人事/财务/管理）。
        创建成功后返回完整部门详情。
      operationId: createDepartment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepartmentRequest'
      responses:
        '201':
          description: 部门创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '400':
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation_error:
                  summary: 参数校验失败
                  value:
                    code: "VALIDATION_ERROR"
                    message: "请求参数校验失败"
                    details:
                      - field: "name"
                        message: "部门名称长度必须在2-64个字符之间"
        '409':
          description: 资源冲突（部门名称或编码已存在）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                name_conflict:
                  summary: 部门名称已存在
                  value:
                    code: "DUPLICATE_DEPARTMENT_NAME"
                    message: "部门名称已存在"
                code_conflict:
                  summary: 部门编码已存在
                  value:
                    code: "DUPLICATE_DEPARTMENT_CODE"
                    message: "部门编码已存在"

    get:
      tags:
        - 部门管理
      summary: 查询部门列表
      description: |
        分页查询部门列表，支持按类型、状态筛选与关键词搜索。
        `keyword` 可同时模糊匹配 `name`、`code`。列表按 `sort` 升序、`id` 升序排列。
      operationId: listDepartments
      parameters:
        - name: keyword
          in: query
          description: 关键词搜索（模糊匹配部门名称、编码）
          required: false
          schema:
            type: string
            maxLength: 64
            example: "仓"
        - name: type
          in: query
          description: 部门类型筛选
          required: false
          schema:
            $ref: '#/components/schemas/DepartmentType'
        - name: status
          in: query
          description: 部门状态筛选（0=禁用，1=启用）
          required: false
          schema:
            type: integer
            enum: [0, 1]
            example: 1
        - name: page
          in: query
          description: 页码，从 1 开始
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: pageSize
          in: query
          description: 每页条数
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentListResponse'
        '400':
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/departments/{id}:
    get:
      tags:
        - 部门管理
      summary: 查询部门详情
      description: 根据部门 ID 查询完整部门信息。
      operationId: getDepartmentById
      parameters:
        - $ref: '#/components/parameters/DepartmentId'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '404':
          description: 部门不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_found:
                  summary: 部门不存在
                  value:
                    code: "DEPARTMENT_NOT_FOUND"
                    message: "部门不存在"

    put:
      tags:
        - 部门管理
      summary: 更新部门信息
      description: |
        更新部门信息。`code` 部门编码创建后不可修改，不在此接口处理。
        状态通过独立接口变更。更新成功后返回完整部门详情。
      operationId: updateDepartment
      parameters:
        - $ref: '#/components/parameters/DepartmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDepartmentRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '400':
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 部门不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 部门名称冲突
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                name_conflict:
                  summary: 部门名称已存在
                  value:
                    code: "DUPLICATE_DEPARTMENT_NAME"
                    message: "部门名称已存在"

    delete:
      tags:
        - 部门管理
      summary: 删除部门
      description: |
        逻辑删除部门（将 `deleted` 标记为已删除）。
        若该部门下仍有未删除的用户，禁止删除并返回 409。
      operationId: deleteDepartment
      parameters:
        - $ref: '#/components/parameters/DepartmentId'
      responses:
        '204':
          description: 删除成功（无返回内容）
        '404':
          description: 部门不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 部门下仍有用户，无法删除
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                in_use:
                  summary: 部门正在使用
                  value:
                    code: "DEPARTMENT_IN_USE"
                    message: "该部门下仍有用户，无法删除"

  /api/departments/{id}/status:
    patch:
      tags:
        - 部门管理
      summary: 变更部门状态
      description: 启用或禁用部门账号。独立接口设计，便于后续对接状态变更日志。
      operationId: updateDepartmentStatus
      parameters:
        - $ref: '#/components/parameters/DepartmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDepartmentStatusRequest'
      responses:
        '200':
          description: 状态变更成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
        '400':
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 部门不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────────────────────────
  # 顾客管理接口
  # ──────────────────────────────────────────────
  /api/customers:
    post:
      tags:
        - 顾客管理
      summary: 创建顾客
      description: 创建新顾客（客户公司）。`code` 客户编码创建后不可修改，全局唯一。创建成功后返回完整顾客详情。
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: 顾客创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 资源冲突（客户名称或编码已存在）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                name_conflict:
                  summary: 客户名称已存在
                  value:
                    code: "DUPLICATE_CUSTOMER_NAME"
                    message: "客户名称已存在"
                code_conflict:
                  summary: 客户编码已存在
                  value:
                    code: "DUPLICATE_CUSTOMER_CODE"
                    message: "客户编码已存在"

    get:
      tags:
        - 顾客管理
      summary: 查询顾客列表
      description: |
        分页查询顾客列表，支持按状态筛选与关键词搜索。
        `keyword` 可同时模糊匹配 `name`、`code`、`contact`。
      operationId: listCustomers
      parameters:
        - name: keyword
          in: query
          description: 关键词搜索（模糊匹配名称、编码、联系人）
          required: false
          schema:
            type: string
            maxLength: 128
            example: "上海"
        - name: status
          in: query
          description: 状态筛选（0=禁用，1=启用）
          required: false
          schema:
            type: integer
            enum: [0, 1]
            example: 1
        - name: page
          in: query
          description: 页码，从 1 开始
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: pageSize
          in: query
          description: 每页条数
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerListResponse'
        '400':
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/customers/{id}:
    get:
      tags:
        - 顾客管理
      summary: 查询顾客详情
      description: 根据顾客 ID 查询完整顾客信息。
      operationId: getCustomerById
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          description: 顾客不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                not_found:
                  summary: 顾客不存在
                  value:
                    code: "CUSTOMER_NOT_FOUND"
                    message: "顾客不存在"

    put:
      tags:
        - 顾客管理
      summary: 更新顾客信息
      description: |
        更新顾客信息。`code` 客户编码创建后不可修改，不在此接口处理。
        状态通过独立接口变更。更新成功后返回完整顾客详情。
      operationId: updateCustomer
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 顾客不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 客户名称冲突
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                name_conflict:
                  summary: 客户名称已存在
                  value:
                    code: "DUPLICATE_CUSTOMER_NAME"
                    message: "客户名称已存在"

    delete:
      tags:
        - 顾客管理
      summary: 删除顾客
      description: 逻辑删除顾客（将 `deleted` 标记为已删除）。
      operationId: deleteCustomer
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '204':
          description: 删除成功（无返回内容）
        '404':
          description: 顾客不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/customers/{id}/status:
    patch:
      tags:
        - 顾客管理
      summary: 变更顾客状态
      description: 启用或禁用顾客。
      operationId: updateCustomerStatus
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerStatusRequest'
      responses:
        '200':
          description: 状态变更成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 顾客不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    UserId:
      name: id
      in: path
      description: 用户 ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    DepartmentId:
      name: id
      in: path
      description: 部门 ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    CustomerId:
      name: id
      in: path
      description: 顾客 ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1

  schemas:
    # ──────────────────────────────────────────────
    # 请求体 Schemas
    # ──────────────────────────────────────────────

    CreateUserRequest:
      type: object
      description: 创建用户请求体
      required:
        - employeeNo
        - username
        - password
        - name
        - phoneNumber
      properties:
        employeeNo:
          type: string
          description: HR 分配的工号（创建后不可修改）
          minLength: 2
          maxLength: 32
          pattern: '^[A-Za-z0-9\-]+$'
          example: "WH-20260001"
        username:
          type: string
          description: 登录账号（创建后不可修改）
          minLength: 4
          maxLength: 64
          pattern: '^[A-Za-z0-9_]+$'
          example: "zhangsan"
        password:
          type: string
          description: 登录密码（8~32位，至少含字母和数字）
          format: password
          minLength: 8
          maxLength: 32
          example: "Pass1234"
        name:
          type: string
          description: 员工真实姓名
          minLength: 2
          maxLength: 64
          example: "张三"
        nickname:
          type: string
          description: 系统内显示名称
          maxLength: 64
          example: "小张"
        gender:
          type: integer
          description: "性别：0=未知，1=男，2=女"
          enum: [0, 1, 2]
          default: 0
          example: 1
        phoneNumber:
          type: string
          description: 手机号码
          pattern: '^1[3-9]\d{9}$'
          example: "13800138000"
        email:
          type: string
          description: 企业邮箱
          format: email
          maxLength: 128
          example: "zhangsan@company.com"
        jobTitle:
          type: string
          description: 职位名称
          maxLength: 64
          example: "仓管员"
        departmentId:
          type: integer
          format: int64
          description: 所属部门 ID
          example: 1
        hidePhoneNumber:
          type: boolean
          description: 是否隐藏手机号
          default: false
          example: false
        hideName:
          type: boolean
          description: 是否隐藏姓名
          default: false
          example: false
        remark:
          type: string
          description: 管理员备注
          maxLength: 500
          example: "2026年春季入职"
        status:
          type: integer
          description: "账号状态：0=禁用，1=启用"
          enum: [0, 1]
          default: 1
          example: 1

    UpdateUserRequest:
      type: object
      description: |
        更新用户请求体。所有字段均为可选，仅传入需要修改的字段。
        `employeeNo`、`username` 创建后不可修改，不出现在此请求中。
        `password` 通过独立接口重置，不出现在此请求中。
      properties:
        name:
          type: string
          description: 员工真实姓名
          minLength: 2
          maxLength: 64
          example: "张三丰"
        nickname:
          type: string
          description: 系统内显示名称
          maxLength: 64
          example: "老张"
        avatar:
          type: string
          description: 头像图片 URL
          format: uri
          maxLength: 512
          example: "https://cdn.example.com/avatars/zhangsan.png"
        gender:
          type: integer
          description: "性别：0=未知，1=男，2=女"
          enum: [0, 1, 2]
          example: 1
        phoneNumber:
          type: string
          description: 手机号码
          pattern: '^1[3-9]\d{9}$'
          example: "13900139000"
        email:
          type: string
          description: 企业邮箱
          format: email
          maxLength: 128
          example: "zhangsan@company.com"
        jobTitle:
          type: string
          description: 职位名称
          maxLength: 64
          example: "高级仓管员"
        departmentId:
          type: integer
          format: int64
          description: 所属部门 ID
          example: 2
        hidePhoneNumber:
          type: boolean
          description: 是否隐藏手机号
          example: true
        hideName:
          type: boolean
          description: 是否隐藏姓名
          example: false
        remark:
          type: string
          description: 管理员备注
          maxLength: 500
          example: "已晋升为高级仓管员"

    UpdateUserStatusRequest:
      type: object
      description: 变更用户状态请求体
      required:
        - status
      properties:
        status:
          type: integer
          description: "账号状态：0=禁用，1=启用"
          enum: [0, 1]
          example: 0

    ResetUserPasswordRequest:
      type: object
      description: 重置用户密码请求体
      required:
        - newPassword
      properties:
        newPassword:
          type: string
          description: 新密码（8~32位，至少含字母和数字）
          format: password
          minLength: 8
          maxLength: 32
          example: "NewPass1234"

    # ──────────────────────────────────────────────
    # 响应体 Schemas
    # ──────────────────────────────────────────────

    User:
      type: object
      description: |
        用户详情响应体。包含用户完整信息，用于详情查看和编辑回显。
        注意：`password` 和 `deleted` 永远不出现在响应中。
      properties:
        id:
          type: integer
          format: int64
          description: 用户 ID
          example: 1
        employeeNo:
          type: string
          description: HR 分配的工号
          example: "WH-20260001"
        username:
          type: string
          description: 登录账号
          example: "zhangsan"
        name:
          type: string
          description: 员工真实姓名
          example: "张三"
        nickname:
          type: string
          description: 系统内显示名称
          nullable: true
          example: "小张"
        avatar:
          type: string
          description: 头像图片 URL
          nullable: true
          example: "https://cdn.example.com/avatars/zhangsan.png"
        gender:
          type: integer
          description: "性别：0=未知，1=男，2=女"
          enum: [0, 1, 2]
          example: 1
        phoneNumber:
          type: string
          description: 手机号码
          example: "13800138000"
        email:
          type: string
          description: 企业邮箱
          nullable: true
          example: "zhangsan@company.com"
        jobTitle:
          type: string
          description: 职位名称
          nullable: true
          example: "仓管员"
        departmentId:
          type: integer
          format: int64
          description: 所属部门 ID
          nullable: true
          example: 1
        departmentName:
          type: string
          description: 所属部门名称（关联查询，前端展示用）
          nullable: true
          example: "一号仓库"
        hidePhoneNumber:
          type: boolean
          description: 是否隐藏手机号
          example: false
        hideName:
          type: boolean
          description: 是否隐藏姓名
          example: false
        remark:
          type: string
          description: 管理员备注
          nullable: true
          example: "2026年春季入职"
        status:
          type: integer
          description: "账号状态：0=禁用，1=启用"
          enum: [0, 1]
          example: 1
        createdAt:
          type: string
          format: date-time
          description: 创建时间
          example: "2026-04-22T10:00:00"
        updatedAt:
          type: string
          format: date-time
          description: 更新时间
          example: "2026-04-22T10:00:00"
        createdBy:
          type: integer
          format: int64
          description: 创建人 ID
          nullable: true
          example: 1
        updatedBy:
          type: integer
          format: int64
          description: 更新人 ID
          nullable: true
          example: 1

    UserSummary:
      type: object
      description: |
        用户摘要响应体，用于列表展示。相比 `User` 精简了 remark、隐私设置等详情字段，
        降低列表接口数据传输量。
      properties:
        id:
          type: integer
          format: int64
          description: 用户 ID
          example: 1
        employeeNo:
          type: string
          description: HR 分配的工号
          example: "WH-20260001"
        username:
          type: string
          description: 登录账号
          example: "zhangsan"
        name:
          type: string
          description: 员工真实姓名
          example: "张三"
        nickname:
          type: string
          description: 系统内显示名称
          nullable: true
          example: "小张"
        avatar:
          type: string
          description: 头像图片 URL
          nullable: true
          example: "https://cdn.example.com/avatars/zhangsan.png"
        gender:
          type: integer
          description: "性别：0=未知，1=男，2=女"
          enum: [0, 1, 2]
          example: 1
        phoneNumber:
          type: string
          description: 手机号码
          example: "138****8000"
        email:
          type: string
          description: 企业邮箱
          nullable: true
          example: "zhangsan@company.com"
        jobTitle:
          type: string
          description: 职位名称
          nullable: true
          example: "仓管员"
        departmentId:
          type: integer
          format: int64
          description: 所属部门 ID
          nullable: true
          example: 1
        departmentName:
          type: string
          description: 所属部门名称
          nullable: true
          example: "一号仓库"
        status:
          type: integer
          description: "账号状态：0=禁用，1=启用"
          enum: [0, 1]
          example: 1
        createdAt:
          type: string
          format: date-time
          description: 创建时间
          example: "2026-04-22T10:00:00"

    UserListResponse:
      type: object
      description: 用户列表分页响应体
      properties:
        items:
          type: array
          description: 用户列表数据
          items:
            $ref: '#/components/schemas/UserSummary'
        total:
          type: integer
          format: int64
          description: 总记录数
          example: 100
        page:
          type: integer
          description: 当前页码
          example: 1
        pageSize:
          type: integer
          description: 每页条数
          example: 20
        totalPages:
          type: integer
          description: 总页数
          example: 5

    # ──────────────────────────────────────────────
    # 部门相关 Schemas
    # ──────────────────────────────────────────────

    DepartmentType:
      type: string
      description: |
        部门类型枚举：
        - `WAREHOUSE` 仓管
        - `TRANSPORT` 运输
        - `SALES` 销售
        - `PRODUCTION` 生产
        - `OFFICE` 办公（Office）
        - `HR` 人事
        - `FINANCE` 财务
        - `MANAGEMENT` 管理（管理层 / 老板层级）
      enum:
        - WAREHOUSE
        - TRANSPORT
        - SALES
        - PRODUCTION
        - OFFICE
        - HR
        - FINANCE
        - MANAGEMENT
      example: WAREHOUSE

    CreateDepartmentRequest:
      type: object
      description: 创建部门请求体
      required:
        - name
        - code
        - type
      properties:
        name:
          type: string
          description: 部门名称（全局唯一）
          minLength: 2
          maxLength: 64
          example: "一号仓库"
        code:
          type: string
          description: 部门编码（创建后不可修改，全局唯一）
          minLength: 2
          maxLength: 32
          pattern: '^[A-Za-z0-9\-]+$'
          example: "WH-01"
        type:
          allOf:
            - $ref: '#/components/schemas/DepartmentType'
          description: 部门类型
        sort:
          type: integer
          description: 显示排序（升序，越小越靠前）
          default: 0
          example: 1
        remark:
          type: string
          description: 备注
          maxLength: 500
          example: "主仓库，存放快消品"
        status:
          type: integer
          description: "部门状态：0=禁用，1=启用"
          enum: [0, 1]
          default: 1
          example: 1

    UpdateDepartmentRequest:
      type: object
      description: |
        更新部门请求体。所有字段均为可选，仅传入需要修改的字段。
        `code` 创建后不可修改，不出现在此请求中；状态通过独立接口变更。
      properties:
        name:
          type: string
          description: 部门名称（全局唯一）
          minLength: 2
          maxLength: 64
          example: "一号仓库"
        type:
          allOf:
            - $ref: '#/components/schemas/DepartmentType'
          description: 部门类型
        sort:
          type: integer
          description: 显示排序（升序，越小越靠前）
          example: 2
        remark:
          type: string
          description: 备注
          maxLength: 500
          example: "已扩容，新增冷链区"

    UpdateDepartmentStatusRequest:
      type: object
      description: 变更部门状态请求体
      required:
        - status
      properties:
        status:
          type: integer
          description: "部门状态：0=禁用，1=启用"
          enum: [0, 1]
          example: 0

    Department:
      type: object
      description: |
        部门详情响应体。包含部门完整信息，用于详情查看和编辑回显。
        注意：`deleted` 永不出现在响应中。
      properties:
        id:
          type: integer
          format: int64
          description: 部门 ID
          example: 1
        name:
          type: string
          description: 部门名称
          example: "一号仓库"
        code:
          type: string
          description: 部门编码
          example: "WH-01"
        type:
          allOf:
            - $ref: '#/components/schemas/DepartmentType'
          description: 部门类型
        status:
          type: integer
          description: "部门状态：0=禁用，1=启用"
          enum: [0, 1]
          example: 1
        sort:
          type: integer
          description: 显示排序
          example: 1
