# 引导用纯 HTTP 配置：仅用于「全新机器首次部署、还没签证书」的阶段。
# 用途：起 nginx → 承载 ACME http-01 验证 + 临时 HTTP 代理 → 用 certbot 签发证书 →
#       把 deploy/nginx/default.conf 换回 HTTPS 版（仓库默认即 HTTPS 版）→ reload nginx。
# 签证书命令务必加 --entrypoint certbot（覆盖 compose 里 certbot 的 renew 死循环），详见 docs/deploy.md §8.1。
upstream api_backend {
    server api:8080;
}
upstream web_backend {
    server web:80;
}

server {
    listen 80;
    server_name hpclaw.org www.hpclaw.org;

    # ACME http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 签证书前，先用 HTTP 代理跑通流程
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass         http://web_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
