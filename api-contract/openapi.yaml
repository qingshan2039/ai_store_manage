          example: "2026-04-22T10:00:00"
        updatedAt:
          type: string
          format: date-time
          description: 更新时间
          example: "2026-04-22T10:00:00"
        createdBy:
          type: integer
          format: int64
          description: 创建人 ID
          nullable: true
          example: 1
        updatedBy:
          type: integer
          format: int64
          description: 更新人 ID
          nullable: true
          example: 1

    DepartmentSummary:
      type: object
      description: 部门摘要响应体，用于列表展示。
      properties:
        id:
          type: integer
          format: int64
          description: 部门 ID
          example: 1
        name:
          type: string
          description: 部门名称
          example: "一号仓库"
        code:
          type: string
          description: 部门编码
          example: "WH-01"
        type:
          allOf:
            - $ref: '#/components/schemas/DepartmentType'
          description: 部门类型
        status:
          type: integer
          description: "部门状态：0=禁用，1=启用"
          enum: [0, 1]
          example: 1
        sort:
          type: integer
          description: 显示排序
          example: 1
        createdAt:
          type: string
          format: date-time
          description: 创建时间
          example: "2026-04-22T10:00:00"

    DepartmentListResponse:
      type: object
      description: 部门列表分页响应体
      properties:
        items:
          type: array
          description: 部门列表数据
          items:
            $ref: '#/components/schemas/DepartmentSummary'
        total:
          type: integer
          format: int64
          description: 总记录数
          example: 8
        page:
          type: integer
          description: 当前页码
          example: 1
        pageSize:
          type: integer
          description: 每页条数
          example: 20
        totalPages:
          type: integer
          description: 总页数
          example: 1

    # ──────────────────────────────────────────────
    # 顾客相关 Schemas
    # ──────────────────────────────────────────────

    CreateCustomerRequest:
      type: object
      description: 创建顾客请求体
      required:
        - code
        - name
        - address
        - shipAddress
      properties:
        code:
          type: string
          description: 客户编码（创建后不可修改，全局唯一）
          minLength: 2
          maxLength: 32
          pattern: '^[A-Za-z0-9\-]+$'
          example: "CUST-001"
        name:
          type: string
          description: 客户公司名称（全局唯一）
          minLength: 2
          maxLength: 128
          example: "上海示例贸易有限公司"
        address:
          type: string
          description: 客户公司地址
          minLength: 2
          maxLength: 255
          example: "上海市浦东新区世纪大道 100 号"
        shipAddress:
          type: string
          description: 收/发货地址（ship-to）
          minLength: 2
          maxLength: 255
          example: "上海市嘉定区物流园 5 号库"
        contact:
          type: string
          description: 联系人
          maxLength: 64
          example: "王经理"
        phone:
          type: string
          description: 联系电话
          maxLength: 32
          example: "021-66889900"
        email:
          type: string
          description: 邮箱
          format: email
          maxLength: 128
          example: "contact@example.com"
        remark:
          type: string
          description: 备注
          maxLength: 500
          example: "重点客户"
        status:
          type: integer
          description: "状态：0=禁用，1=启用"
          enum: [0, 1]
          default: 1
          example: 1

    UpdateCustomerRequest:
      type: object
      description: |
        更新顾客请求体。所有字段均为可选，仅传入需要修改的字段。
        `code` 创建后不可修改，不出现在此请求中；状态通过独立接口变更。
