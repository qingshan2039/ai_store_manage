        updatedAt: { type: string, format: date-time }
        createdBy: { type: integer, format: int64, nullable: true }
        updatedBy: { type: integer, format: int64, nullable: true }
    ZoneSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        warehouseId: { type: integer, format: int64 }
        warehouseName: { type: string, nullable: true }
        code: { type: string }
        name: { type: string }
        type: { type: string, nullable: true }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
    ZoneListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ZoneSummary' } }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }

    # 托盘类型（ISO 规格）
    CreatePalletTypeRequest:
      type: object
      required: [code, name, length, width]
      properties:
        code: { type: string, minLength: 2, maxLength: 32, pattern: '^[A-Za-z0-9\-]+$', example: "ISO-A" }
        name: { type: string, minLength: 1, maxLength: 64, example: "大托盘 1200x1000" }
        length: { type: number, description: 长(mm), example: 1200 }
        width: { type: number, description: 宽(mm), example: 1000 }
        tareWeight: { type: number, description: 皮重(kg) }
        maxLoad: { type: number, description: 最大载重(kg) }
        maxStack: { type: integer, description: 最大堆叠层 }
        status: { type: integer, enum: [0, 1], default: 1 }
        remark: { type: string, maxLength: 500 }
    UpdatePalletTypeRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        length: { type: number }
        width: { type: number }
        tareWeight: { type: number }
        maxLoad: { type: number }
        maxStack: { type: integer }
        remark: { type: string, maxLength: 500 }
    PalletType:
      type: object
      properties:
        id: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        length: { type: number }
        width: { type: number }
        tareWeight: { type: number, nullable: true }
        maxLoad: { type: number, nullable: true }
        maxStack: { type: integer, nullable: true }
        status: { type: integer, enum: [0, 1] }
        remark: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: integer, format: int64, nullable: true }
        updatedBy: { type: integer, format: int64, nullable: true }
    PalletTypeSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        length: { type: number }
        width: { type: number }
        maxLoad: { type: number, nullable: true }
        maxStack: { type: integer, nullable: true }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
    PalletTypeListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/PalletTypeSummary' } }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }

    # ──────────────────────────────────────────────
    # 物料目录 Schema（品类 / SPU / SKU）
    # ──────────────────────────────────────────────
    ItemType:
      type: string
      enum: [RAW, SEMI, FINISHED]
      description: 物料阶段类型 原料/半成品/成品

    # 品类
    CreateMaterialCategoryRequest:
      type: object
      required: [code, name]
      properties:
        code: { type: string, minLength: 2, maxLength: 32, pattern: '^[A-Za-z0-9\-]+$', example: "CORE" }
        name: { type: string, minLength: 1, maxLength: 64, example: "纸管" }
        sortOrder: { type: integer, default: 0, description: 排序值（小在前） }
        status: { type: integer, enum: [0, 1], default: 1 }
    UpdateMaterialCategoryRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        sortOrder: { type: integer }
    MaterialCategory:
      type: object
      properties:
        id: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        sortOrder: { type: integer }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: integer, format: int64, nullable: true }
        updatedBy: { type: integer, format: int64, nullable: true }
    MaterialCategorySummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        sortOrder: { type: integer }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
    MaterialCategoryListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/MaterialCategorySummary' } }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }

    # SPU（标准产品单元 / 物料主，品类层）
    CreateSpuRequest:
      type: object
      required: [spuCode, spuName, categoryCode, baseUnit]
      properties:
        spuCode: { type: string, minLength: 2, maxLength: 32, pattern: '^[A-Za-z0-9\-]+$', example: "CORE-3IN" }
        spuName: { type: string, minLength: 1, maxLength: 128, example: "3寸纸管" }
        categoryCode: { type: string, minLength: 1, maxLength: 32, description: 所属品类编码, example: "CORE" }
        brand: { type: string, maxLength: 64, nullable: true }
        baseUnit: { type: string, minLength: 1, maxLength: 16, description: 基本单位 PCS/ROLL/张…, example: "PCS" }
        status: { type: integer, enum: [0, 1], default: 1 }
    UpdateSpuRequest:
      type: object
      properties:
        spuName: { type: string, minLength: 1, maxLength: 128 }
        categoryCode: { type: string, minLength: 1, maxLength: 32 }
        brand: { type: string, maxLength: 64 }
        baseUnit: { type: string, minLength: 1, maxLength: 16 }
    Spu:
      type: object
      properties:
        id: { type: integer, format: int64 }
        spuCode: { type: string }
        spuName: { type: string }
        categoryCode: { type: string }
        categoryName: { type: string, nullable: true, description: 品类名称（关联查询） }
        brand: { type: string, nullable: true }
        baseUnit: { type: string }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: integer, format: int64, nullable: true }
        updatedBy: { type: integer, format: int64, nullable: true }
    SpuSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        spuCode: { type: string }
        spuName: { type: string }
        categoryCode: { type: string }
        categoryName: { type: string, nullable: true }
        baseUnit: { type: string }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
    SpuListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/SpuSummary' } }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }

    # SKU（最小库存单元）
    CreateSkuRequest:
      type: object
      required: [spuId, skuCode, skuName, itemType]
      properties:
        spuId: { type: integer, format: int64, description: 所属 SPU }
        skuCode: { type: string, minLength: 2, maxLength: 48, pattern: '^[A-Za-z0-9\-]+$', example: "PC-340480-A" }
        skuName: { type: string, minLength: 1, maxLength: 128, example: "纸管 340x480x5mm 规格A" }
        itemType: { $ref: '#/components/schemas/ItemType' }
        lengthMm: { type: number, nullable: true, description: 长(mm) }
        widthMm: { type: number, nullable: true, description: 宽(mm) }
        thicknessMm: { type: number, nullable: true, description: 厚(mm) }
        rollLengthM: { type: number, nullable: true, description: 卷长(m，膜类) }
        color: { type: string, maxLength: 32, nullable: true }
        gsm: { type: number, nullable: true, description: 克重(g/m²) }
        spec: { type: object, additionalProperties: true, nullable: true, description: 同尺寸下的细分规格（材质/牌号/工艺等），存 jsonb }
        status: { type: integer, enum: [0, 1], default: 1 }
    UpdateSkuRequest:
      type: object
      properties:
        skuName: { type: string, minLength: 1, maxLength: 128 }
        itemType: { $ref: '#/components/schemas/ItemType' }
        lengthMm: { type: number }
        widthMm: { type: number }
        thicknessMm: { type: number }
        rollLengthM: { type: number }
        color: { type: string, maxLength: 32 }
        gsm: { type: number }
        spec: { type: object, additionalProperties: true }
    Sku:
      type: object
      properties:
        id: { type: integer, format: int64 }
        spuId: { type: integer, format: int64 }
        spuCode: { type: string, nullable: true, description: 所属 SPU 编码（关联查询） }
        spuName: { type: string, nullable: true, description: 所属 SPU 名称（关联查询） }
        skuCode: { type: string }
        skuName: { type: string }
        itemType: { $ref: '#/components/schemas/ItemType' }
        lengthMm: { type: number, nullable: true }
        widthMm: { type: number, nullable: true }
        thicknessMm: { type: number, nullable: true }
        rollLengthM: { type: number, nullable: true }
        color: { type: string, nullable: true }
        gsm: { type: number, nullable: true }
        spec: { type: object, additionalProperties: true, nullable: true }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: integer, format: int64, nullable: true }
        updatedBy: { type: integer, format: int64, nullable: true }
    SkuSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        spuId: { type: integer, format: int64 }
        spuName: { type: string, nullable: true }
        skuCode: { type: string }
        skuName: { type: string }
        itemType: { $ref: '#/components/schemas/ItemType' }
        lengthMm: { type: number, nullable: true }
        widthMm: { type: number, nullable: true }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
    SkuListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/SkuSummary' } }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }

    # ──────────────────────────────────────────────
    # 包装与条码 Schema（Phase B）
    # ──────────────────────────────────────────────
    BarcodeType:
      type: string
      enum: [EAN13, ITF14, SSCC, OTHER]
      description: 条码类型

    # 包装层级
    CreatePackagingLevelRequest:
      type: object
      required: [skuId, levelName, levelSeq, unitCode]
      properties:
        skuId: { type: integer, format: int64 }
        levelName: { type: string, minLength: 1, maxLength: 32, example: "箱" }
        levelSeq: { type: integer, description: 层级序号（1=基本单位起） }
        unitCode: { type: string, minLength: 1, maxLength: 16, example: "CTN" }
        length: { type: number, nullable: true }
        width: { type: number, nullable: true }
        height: { type: number, nullable: true }
        netWeight: { type: number, nullable: true }
        grossWeight: { type: number, nullable: true }
        isBaseUnit: { type: integer, enum: [0, 1], default: 0 }
        isSellable: { type: integer, enum: [0, 1], default: 0 }
        status: { type: integer, enum: [0, 1], default: 1 }
    UpdatePackagingLevelRequest:
      type: object
      properties:
        levelName: { type: string, minLength: 1, maxLength: 32 }
        unitCode: { type: string, minLength: 1, maxLength: 16 }
        length: { type: number }
        width: { type: number }
        height: { type: number }
        netWeight: { type: number }
        grossWeight: { type: number }
        isBaseUnit: { type: integer, enum: [0, 1] }
        isSellable: { type: integer, enum: [0, 1] }
    PackagingLevel:
      type: object
      properties:
        id: { type: integer, format: int64 }
        skuId: { type: integer, format: int64 }
        skuCode: { type: string, nullable: true }
        skuName: { type: string, nullable: true }
        levelName: { type: string }
        levelSeq: { type: integer }
        unitCode: { type: string }
        length: { type: number, nullable: true }
        width: { type: number, nullable: true }
        height: { type: number, nullable: true }
        netWeight: { type: number, nullable: true }
        grossWeight: { type: number, nullable: true }
        isBaseUnit: { type: integer, enum: [0, 1] }
        isSellable: { type: integer, enum: [0, 1] }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: integer, format: int64, nullable: true }
        updatedBy: { type: integer, format: int64, nullable: true }
    PackagingLevelSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        skuId: { type: integer, format: int64 }
        skuName: { type: string, nullable: true }
        levelName: { type: string }
        levelSeq: { type: integer }
        unitCode: { type: string }
        isBaseUnit: { type: integer, enum: [0, 1] }
        isSellable: { type: integer, enum: [0, 1] }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
    PackagingLevelListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/PackagingLevelSummary' } }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }

    # 包装关系（父层含子层数量）
    CreatePackagingRelationRequest:
      type: object
      required: [parentLevelId, childLevelId, childQty]
      properties:
        parentLevelId: { type: integer, format: int64 }
        childLevelId: { type: integer, format: int64 }
        childQty: { type: number, description: 1 父层含子层数量（如 1 托=500 箱） }
        isFixedQty: { type: integer, enum: [0, 1], default: 1, description: 1=定量整托 0=不满托 }
        tareWeight: { type: number, nullable: true }
        status: { type: integer, enum: [0, 1], default: 1 }
    UpdatePackagingRelationRequest:
      type: object
      properties:
        childQty: { type: number }
        isFixedQty: { type: integer, enum: [0, 1] }
        tareWeight: { type: number }
    PackagingRelation:
      type: object
      properties:
        id: { type: integer, format: int64 }
        parentLevelId: { type: integer, format: int64 }
        parentLevelName: { type: string, nullable: true }
        childLevelId: { type: integer, format: int64 }
        childLevelName: { type: string, nullable: true }
        childQty: { type: number }
        isFixedQty: { type: integer, enum: [0, 1] }
        tareWeight: { type: number, nullable: true }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: integer, format: int64, nullable: true }
        updatedBy: { type: integer, format: int64, nullable: true }
    PackagingRelationSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        parentLevelId: { type: integer, format: int64 }
        parentLevelName: { type: string, nullable: true }
        childLevelId: { type: integer, format: int64 }
        childLevelName: { type: string, nullable: true }
        childQty: { type: number }
        isFixedQty: { type: integer, enum: [0, 1] }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
    PackagingRelationListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/PackagingRelationSummary' } }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }

    # 条码
    CreateBarcodeRequest:
      type: object
      required: [levelId, barcode, barcodeType]
      properties:
        levelId: { type: integer, format: int64 }
        barcode: { type: string, minLength: 1, maxLength: 64 }
        barcodeType: { $ref: '#/components/schemas/BarcodeType' }
        isPrimary: { type: integer, enum: [0, 1], default: 0 }
        validFrom: { type: string, format: date, nullable: true }
        validTo: { type: string, format: date, nullable: true }
        status: { type: integer, enum: [0, 1], default: 1 }
    UpdateBarcodeRequest:
      type: object
      properties:
        barcodeType: { $ref: '#/components/schemas/BarcodeType' }
        isPrimary: { type: integer, enum: [0, 1] }
        validFrom: { type: string, format: date }
        validTo: { type: string, format: date }
    Barcode:
      type: object
      properties:
        id: { type: integer, format: int64 }
        levelId: { type: integer, format: int64 }
        levelName: { type: string, nullable: true }
        barcode: { type: string }
        barcodeType: { $ref: '#/components/schemas/BarcodeType' }
        isPrimary: { type: integer, enum: [0, 1] }
        validFrom: { type: string, format: date, nullable: true }
        validTo: { type: string, format: date, nullable: true }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: integer, format: int64, nullable: true }
        updatedBy: { type: integer, format: int64, nullable: true }
    BarcodeSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        levelId: { type: integer, format: int64 }
        levelName: { type: string, nullable: true }
        barcode: { type: string }
        barcodeType: { $ref: '#/components/schemas/BarcodeType' }
        isPrimary: { type: integer, enum: [0, 1] }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
    BarcodeListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/BarcodeSummary' } }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }

    # 计量换算
    CreateUnitConversionRequest:
      type: object
      required: [skuId, fromUnit, toUnit, factor]
      properties:
        skuId: { type: integer, format: int64 }
        fromUnit: { type: string, minLength: 1, maxLength: 16, example: "ROLL" }
        toUnit: { type: string, minLength: 1, maxLength: 16, example: "M2" }
        factor: { type: number, description: from→to 换算系数 }
        status: { type: integer, enum: [0, 1], default: 1 }
    UpdateUnitConversionRequest:
      type: object
      properties:
        factor: { type: number }
    UnitConversion:
      type: object
      properties:
        id: { type: integer, format: int64 }
        skuId: { type: integer, format: int64 }
        skuCode: { type: string, nullable: true }
        skuName: { type: string, nullable: true }
        fromUnit: { type: string }
        toUnit: { type: string }
        factor: { type: number }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: integer, format: int64, nullable: true }
        updatedBy: { type: integer, format: int64, nullable: true }
    UnitConversionSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        skuId: { type: integer, format: int64 }
        skuName: { type: string, nullable: true }
        fromUnit: { type: string }
        toUnit: { type: string }
        factor: { type: number }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
    UnitConversionListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/UnitConversionSummary' } }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }

    # 物料图片（仅存 URL）
    CreateItemImageRequest:
      type: object
      required: [imageUrl]
      properties:
        spuId: { type: integer, format: int64, nullable: true }
        skuId: { type: integer, format: int64, nullable: true }
        levelId: { type: integer, format: int64, nullable: true }
        imageUrl: { type: string, minLength: 1, maxLength: 512 }
        imageType: { type: string, maxLength: 32, description: "实体/内包装/外包装" }
        sortOrder: { type: integer, default: 0 }
        isPrimary: { type: integer, enum: [0, 1], default: 0 }
        status: { type: integer, enum: [0, 1], default: 1 }
    UpdateItemImageRequest:
      type: object
      properties:
        imageUrl: { type: string, minLength: 1, maxLength: 512 }
        imageType: { type: string, maxLength: 32 }
        sortOrder: { type: integer }
        isPrimary: { type: integer, enum: [0, 1] }
    ItemImage:
      type: object
      properties:
        id: { type: integer, format: int64 }
        spuId: { type: integer, format: int64, nullable: true }
        skuId: { type: integer, format: int64, nullable: true }
        levelId: { type: integer, format: int64, nullable: true }
        imageUrl: { type: string }
        imageType: { type: string, nullable: true }
        sortOrder: { type: integer }
        isPrimary: { type: integer, enum: [0, 1] }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: integer, format: int64, nullable: true }
        updatedBy: { type: integer, format: int64, nullable: true }
    ItemImageSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        spuId: { type: integer, format: int64, nullable: true }
        skuId: { type: integer, format: int64, nullable: true }
        levelId: { type: integer, format: int64, nullable: true }
        imageUrl: { type: string }
        imageType: { type: string, nullable: true }
        sortOrder: { type: integer }
        isPrimary: { type: integer, enum: [0, 1] }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
    ItemImageListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ItemImageSummary' } }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }

    # ──────────────────────────────────────────────
    # 库存与托盘 Schema（Phase C）
    # ──────────────────────────────────────────────
    LpnStatus:
      type: string
      enum: [IN_STOCK, IN_TRANSIT, EMPTY]
      description: 托盘状态 在库/在途/空置
    UpdateLpnStatusRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: '#/components/schemas/LpnStatus' }

    # 库位
    CreateLocationRequest:
      type: object
      required: [warehouseId, code]
      properties:
        warehouseId: { type: integer, format: int64 }
        zoneId: { type: integer, format: int64, nullable: true, description: 所属库区（可空） }
        code: { type: string, minLength: 1, maxLength: 32, pattern: '^[A-Za-z0-9\-]+$', example: "A-01-01" }
        locType: { type: string, maxLength: 32, description: "货架/地堆" }
        status: { type: integer, enum: [0, 1], default: 1 }
    UpdateLocationRequest:
      type: object
      properties:
        code: { type: string, minLength: 1, maxLength: 32, pattern: '^[A-Za-z0-9\-]+$', description: 库位编码（仓库内唯一，可改） }
        zoneId: { type: integer, format: int64 }
        locType: { type: string, maxLength: 32 }
    Location:
      type: object
      properties:
        id: { type: integer, format: int64 }
        warehouseId: { type: integer, format: int64 }
        warehouseName: { type: string, nullable: true }
        zoneId: { type: integer, format: int64, nullable: true }
        zoneName: { type: string, nullable: true }
        code: { type: string }
        locType: { type: string, nullable: true }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: integer, format: int64, nullable: true }
        updatedBy: { type: integer, format: int64, nullable: true }
    LocationSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        warehouseId: { type: integer, format: int64 }
        warehouseName: { type: string, nullable: true }
        zoneName: { type: string, nullable: true }
        code: { type: string }
        locType: { type: string, nullable: true }
        status: { type: integer, enum: [0, 1] }
        createdAt: { type: string, format: date-time }
    LocationListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/LocationSummary' } }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }

    # 托盘实例 LPN
    CreateLpnRequest:
      type: object
      required: [lpnCode, palletTypeId, warehouseId]
      properties:
        lpnCode: { type: string, minLength: 1, maxLength: 64, description: SSCC 托盘号 }
        palletTypeId: { type: integer, format: int64 }
        warehouseId: { type: integer, format: int64 }
        locationId: { type: integer, format: int64, nullable: true }
        status: { allOf: [ { $ref: '#/components/schemas/LpnStatus' } ], default: IN_STOCK }
        grossWeight: { type: number, nullable: true }
    UpdateLpnRequest:
      type: object
      properties:
        locationId: { type: integer, format: int64 }
        grossWeight: { type: number }
    Lpn:
      type: object
      properties:
        id: { type: integer, format: int64 }
        lpnCode: { type: string }
        palletTypeId: { type: integer, format: int64 }
        palletTypeName: { type: string, nullable: true }
        warehouseId: { type: integer, format: int64 }
        warehouseName: { type: string, nullable: true }
        locationId: { type: integer, format: int64, nullable: true }
        locationCode: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/LpnStatus' }
        grossWeight: { type: number, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: integer, format: int64, nullable: true }
        updatedBy: { type: integer, format: int64, nullable: true }
    LpnSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        lpnCode: { type: string }
        palletTypeName: { type: string, nullable: true }
        warehouseName: { type: string, nullable: true }
        locationCode: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/LpnStatus' }
        createdAt: { type: string, format: date-time }
    LpnListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/LpnSummary' } }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }

    # 库存
    CreateInventoryRequest:
      type: object
      required: [skuId, qtyOnHand]
      properties:
        skuId: { type: integer, format: int64 }
        lpnId: { type: integer, format: int64, nullable: true, description: 所在托盘（可空，地面库存） }
        locationId: { type: integer, format: int64, nullable: true }
        lotNo: { type: string, maxLength: 64, nullable: true }
        mfgDate: { type: string, format: date, nullable: true }
        expDate: { type: string, format: date, nullable: true }
        qtyOnHand: { type: number, description: 在库（基本单位） }
        qtyReserved: { type: number, default: 0, description: 锁定 }
    UpdateInventoryRequest:
      type: object
      properties:
        lpnId: { type: integer, format: int64 }
        locationId: { type: integer, format: int64 }
        lotNo: { type: string, maxLength: 64 }
        mfgDate: { type: string, format: date }
        expDate: { type: string, format: date }
        qtyOnHand: { type: number }
        qtyReserved: { type: number }
    Inventory:
      type: object
      properties:
        id: { type: integer, format: int64 }
        skuId: { type: integer, format: int64 }
        skuCode: { type: string, nullable: true }
        skuName: { type: string, nullable: true }
        lpnId: { type: integer, format: int64, nullable: true }
        lpnCode: { type: string, nullable: true }
        locationId: { type: integer, format: int64, nullable: true }
        locationCode: { type: string, nullable: true }
        lotNo: { type: string, nullable: true }
        mfgDate: { type: string, format: date, nullable: true }
        expDate: { type: string, format: date, nullable: true }
        qtyOnHand: { type: number }
        qtyReserved: { type: number }
        qtyAvailable: { type: number, description: qtyOnHand - qtyReserved（计算） }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: integer, format: int64, nullable: true }
        updatedBy: { type: integer, format: int64, nullable: true }
    InventorySummaryItem:
      type: object
      properties:
        id: { type: integer, format: int64 }
        skuId: { type: integer, format: int64 }
        skuName: { type: string, nullable: true }
        lpnCode: { type: string, nullable: true, description: 托盘名称（SSCC 托盘号） }
        palletTypeName: { type: string, nullable: true, description: 托盘类型名（经 LPN 关联） }
        locationCode: { type: string, nullable: true }
        lotNo: { type: string, nullable: true }
        qtyOnHand: { type: number }
        qtyReserved: { type: number }
        qtyAvailable: { type: number }
        createdAt: { type: string, format: date-time }
    InventoryListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/InventorySummaryItem' } }
        total: { type: integer, format: int64 }
        page: { type: integer }
        pageSize: { type: integer }
        totalPages: { type: integer }

    # 库存统计（需求②：库存数量 + 托盘数量 + 整托/尾托）
    InventoryPallet:
      type: object
      properties:
        lpnId: { type: integer, format: int64 }
        lpnCode: { type: string, nullable: true }
        qty: { type: number, description: 该托盘上该 SKU 的在库数量（基本单位） }
        fullPallet: { type: boolean, nullable: true, description: 是否整托（对比标准每托数；无标准则为 null） }
    InventorySummary:
      type: object
      properties:
        skuId: { type: integer, format: int64 }
        skuName: { type: string, nullable: true }
        totalQty: { type: number, description: 总库存 SUM(qty_on_hand) }
        totalReserved: { type: number, description: 总锁定 }
        totalAvailable: { type: number, description: 总可用 }
        palletCount: { type: integer, description: 托盘数量 COUNT(DISTINCT lpn_id) }
        recordCount: { type: integer, description: 库存记录数 }
        standardPalletQty: { type: number, nullable: true, description: 标准每托数（来自 packaging_relation 定量整托；无则 null） }
        pallets: { type: array, items: { $ref: '#/components/schemas/InventoryPallet' }, description: 每托明细（整托/尾托） }

    # ──────────────────────────────────────────────
    # 错误响应 Schema
    # ──────────────────────────────────────────────

    ErrorResponse:
      type: object
      description: 统一错误响应体
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 错误码（大写下划线风格，用于前端判断错误类型）
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: 错误描述（人类可读）
          example: "请求参数校验失败"
        details:
          type: array
          description: 字段级错误详情（参数校验失败时返回）
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      description: 字段级错误详情
      properties:
        field:
          type: string
          description: 出错字段名
          example: "username"
        message:
          type: string
          description: 字段错误描述
          example: "用户名长度必须在4-64个字符之间"
