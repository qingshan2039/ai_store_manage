        name:
          type: string
          description: 客户公司名称（全局唯一）
          minLength: 2
          maxLength: 128
          example: "上海示例贸易有限公司"
        address:
          type: string
          description: 客户公司地址
          minLength: 2
          maxLength: 255
          example: "上海市浦东新区世纪大道 200 号"
        shipAddress:
          type: string
          description: 收/发货地址（ship-to）
          minLength: 2
          maxLength: 255
          example: "上海市青浦区物流中心 8 号库"
        contact:
          type: string
          description: 联系人
          maxLength: 64
          example: "李经理"
        phone:
          type: string
          description: 联系电话
          maxLength: 32
          example: "021-55667788"
        email:
          type: string
          description: 邮箱
          format: email
          maxLength: 128
          example: "new@example.com"
        remark:
          type: string
          description: 备注
          maxLength: 500
          example: "已升级为 VIP"

    UpdateCustomerStatusRequest:
      type: object
      description: 变更顾客状态请求体
      required:
        - status
      properties:
        status:
          type: integer
          description: "状态：0=禁用，1=启用"
          enum: [0, 1]
          example: 0

    Customer:
      type: object
      description: |
        顾客详情响应体。包含客户公司完整信息。
        注意：`deleted` 永不出现在响应中。
      properties:
        id:
          type: integer
          format: int64
          description: 顾客 ID
          example: 1
        code:
          type: string
          description: 客户编码
          example: "CUST-001"
        name:
          type: string
          description: 客户公司名称
          example: "上海示例贸易有限公司"
        address:
          type: string
          description: 客户公司地址
          example: "上海市浦东新区世纪大道 100 号"
        shipAddress:
          type: string
          description: 收/发货地址（ship-to）
          example: "上海市嘉定区物流园 5 号库"
        contact:
          type: string
          description: 联系人
          nullable: true
          example: "王经理"
        phone:
          type: string
          description: 联系电话
          nullable: true
          example: "021-66889900"
        email:
          type: string
          description: 邮箱
          nullable: true
          example: "contact@example.com"
        remark:
          type: string
          description: 备注
          nullable: true
          example: "重点客户"
        status:
          type: integer
          description: "状态：0=禁用，1=启用"
          enum: [0, 1]
          example: 1
        createdAt:
          type: string
          format: date-time
          description: 创建时间
          example: "2026-06-07T10:00:00"
        updatedAt:
          type: string
          format: date-time
          description: 更新时间
          example: "2026-06-07T10:00:00"
        createdBy:
          type: integer
          format: int64
          description: 创建人 ID
          nullable: true
          example: 1
        updatedBy:
          type: integer
          format: int64
          description: 更新人 ID
          nullable: true
          example: 1

    CustomerSummary:
      type: object
      description: 顾客摘要响应体，用于列表展示。
      properties:
        id:
          type: integer
          format: int64
          description: 顾客 ID
          example: 1
        code:
          type: string
          description: 客户编码
          example: "CUST-001"
        name:
          type: string
          description: 客户公司名称
          example: "上海示例贸易有限公司"
        address:
          type: string
          description: 客户公司地址
          example: "上海市浦东新区世纪大道 100 号"
        shipAddress:
          type: string
          description: 收/发货地址（ship-to）
          example: "上海市嘉定区物流园 5 号库"
        contact:
          type: string
          description: 联系人
          nullable: true
          example: "王经理"
        phone:
          type: string
          description: 联系电话
          nullable: true
          example: "021-66889900"
        status:
          type: integer
          description: "状态：0=禁用，1=启用"
          enum: [0, 1]
          example: 1
        createdAt:
          type: string
          format: date-time
          description: 创建时间
          example: "2026-06-07T10:00:00"

    CustomerListResponse:
      type: object
      description: 顾客列表分页响应体
      properties:
        items:
          type: array
          description: 顾客列表数据
          items:
            $ref: '#/components/schemas/CustomerSummary'
        total:
          type: integer
          format: int64
          description: 总记录数
          example: 3
        page:
          type: integer
          description: 当前页码
          example: 1
        pageSize:
          type: integer
          description: 每页条数
          example: 20
        totalPages:
          type: integer
          description: 总页数
          example: 1

    # ──────────────────────────────────────────────
    # 错误响应 Schema
    # ──────────────────────────────────────────────

    ErrorResponse:
      type: object
      description: 统一错误响应体
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 错误码（大写下划线风格，用于前端判断错误类型）
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: 错误描述（人类可读）
          example: "请求参数校验失败"
        details:
          type: array
          description: 字段级错误详情（参数校验失败时返回）
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      description: 字段级错误详情
      properties:
        field:
          type: string
          description: 出错字段名
          example: "username"
        message:
          type: string
          description: 字段错误描述
          example: "用户名长度必须在4-64个字符之间"
