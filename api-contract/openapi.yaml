components:
  parameters:
    UserId:
      name: id
      in: path
      description: 用户 ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    DepartmentId:
      name: id
      in: path
      description: 部门 ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    CustomerId:
      name: id
      in: path
      description: 顾客 ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    SupplierId:
      name: id
      in: path
      description: 供应商 ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    WarehouseId:
      name: id
      in: path
      description: 仓库 ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    ZoneId:
      name: id
      in: path
      description: 库区 ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    PalletTypeId:
      name: id
      in: path
      description: 托盘类型 ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    MaterialCategoryId:
      name: id
      in: path
      description: 物料品类 ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    SpuId:
      name: id
      in: path
      description: SPU ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    SkuId:
      name: id
      in: path
      description: SKU ID
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    PackagingLevelId:
      name: id
      in: path
      description: 包装层级 ID
      required: true
      schema: { type: integer, format: int64, example: 1 }

    PackagingRelationId:
      name: id
      in: path
      description: 包装关系 ID
      required: true
      schema: { type: integer, format: int64, example: 1 }

    BarcodeId:
      name: id
      in: path
      description: 条码 ID
      required: true
      schema: { type: integer, format: int64, example: 1 }

    UnitConversionId:
      name: id
      in: path
      description: 计量换算 ID
      required: true
      schema: { type: integer, format: int64, example: 1 }

    ItemImageId:
      name: id
      in: path
      description: 物料图片 ID
      required: true
      schema: { type: integer, format: int64, example: 1 }

    LocationId:
      name: id
      in: path
      description: 库位 ID
      required: true
      schema: { type: integer, format: int64, example: 1 }

    LpnId:
      name: id
      in: path
      description: 托盘实例 ID
      required: true
      schema: { type: integer, format: int64, example: 1 }

    InventoryId:
      name: id
      in: path
      description: 库存记录 ID
      required: true
      schema: { type: integer, format: int64, example: 1 }

  schemas:
    # ──────────────────────────────────────────────
    # 请求体 Schemas
    # ──────────────────────────────────────────────

    CreateUserRequest:
      type: object
      description: 创建用户请求体
      required:
        - employeeNo
        - username
        - password
        - name
        - phoneNumber
      properties:
        employeeNo:
          type: string
          description: HR 分配的工号（创建后不可修改）
          minLength: 2
          maxLength: 32
          pattern: '^[A-Za-z0-9\-]+$'
          example: "WH-20260001"
        username:
          type: string
          description: 登录账号（创建后不可修改）
          minLength: 4
          maxLength: 64
          pattern: '^[A-Za-z0-9_]+$'
          example: "zhangsan"
        password:
          type: string
          description: 登录密码（8~32位，至少含字母和数字）
          format: password
          minLength: 8
          maxLength: 32
          example: "Pass1234"
        name:
          type: string
          description: 员工真实姓名
          minLength: 2
          maxLength: 64
          example: "张三"
        nickname:
          type: string
          description: 系统内显示名称
          maxLength: 64
          example: "小张"
        gender:
          type: integer
          description: "性别：0=未知，1=男，2=女"
          enum: [0, 1, 2]
          default: 0
          example: 1
        phoneNumber:
          type: string
          description: 手机号码
          pattern: '^1[3-9]\d{9}$'
          example: "13800138000"
        email:
          type: string
          description: 企业邮箱
          format: email
          maxLength: 128
          example: "zhangsan@company.com"
        jobTitle:
          type: string
          description: 职位名称
          maxLength: 64
          example: "仓管员"
        departmentId:
          type: integer
          format: int64
          description: 所属部门 ID
          example: 1
        hidePhoneNumber:
          type: boolean
          description: 是否隐藏手机号
          default: false
          example: false
        hideName:
          type: boolean
          description: 是否隐藏姓名
          default: false
          example: false
        remark:
          type: string
          description: 管理员备注
          maxLength: 500
          example: "2026年春季入职"
        status:
          type: integer
          description: "账号状态：0=禁用，1=启用"
          enum: [0, 1]
          default: 1
          example: 1

    UpdateUserRequest:
      type: object
      description: |
        更新用户请求体。所有字段均为可选，仅传入需要修改的字段。
        `employeeNo`、`username` 创建后不可修改，不出现在此请求中。
        `password` 通过独立接口重置，不出现在此请求中。
      properties:
        name:
          type: string
          description: 员工真实姓名
          minLength: 2
          maxLength: 64
          example: "张三丰"
        nickname:
          type: string
          description: 系统内显示名称
          maxLength: 64
          example: "老张"
        avatar:
          type: string
          description: 头像图片 URL
          format: uri
          maxLength: 512
          example: "https://cdn.example.com/avatars/zhangsan.png"
        gender:
          type: integer
          description: "性别：0=未知，1=男，2=女"
          enum: [0, 1, 2]
          example: 1
        phoneNumber:
          type: string
          description: 手机号码
          pattern: '^1[3-9]\d{9}$'
          example: "13900139000"
        email:
          type: string
          description: 企业邮箱
          format: email
          maxLength: 128
          example: "zhangsan@company.com"
        jobTitle:
          type: string
          description: 职位名称
          maxLength: 64
          example: "高级仓管员"
        departmentId:
          type: integer
          format: int64
          description: 所属部门 ID
          example: 2
        hidePhoneNumber:
          type: boolean
          description: 是否隐藏手机号
          example: true
        hideName:
          type: boolean
          description: 是否隐藏姓名
          example: false
        remark:
          type: string
          description: 管理员备注
          maxLength: 500
          example: "已晋升为高级仓管员"

    UpdateUserStatusRequest:
      type: object
      description: 变更用户状态请求体
      required:
        - status
      properties:
        status:
          type: integer
          description: "账号状态：0=禁用，1=启用"
          enum: [0, 1]
          example: 0

    ResetUserPasswordRequest:
      type: object
      description: 重置用户密码请求体
      required:
        - newPassword
      properties:
        newPassword:
          type: string
          description: 新密码（8~32位，至少含字母和数字）
          format: password
          minLength: 8
          maxLength: 32
          example: "NewPass1234"

    # ──────────────────────────────────────────────
    # 响应体 Schemas
    # ──────────────────────────────────────────────

    User:
      type: object
      description: |
        用户详情响应体。包含用户完整信息，用于详情查看和编辑回显。
        注意：`password` 和 `deleted` 永远不出现在响应中。
      properties:
        id:
          type: integer
          format: int64
          description: 用户 ID
          example: 1
        employeeNo:
          type: string
          description: HR 分配的工号
          example: "WH-20260001"
        username:
          type: string
          description: 登录账号
          example: "zhangsan"
        name:
          type: string
          description: 员工真实姓名
          example: "张三"
        nickname:
          type: string
          description: 系统内显示名称
          nullable: true
          example: "小张"
        avatar:
          type: string
          description: 头像图片 URL
          nullable: true
          example: "https://cdn.example.com/avatars/zhangsan.png"
        gender:
          type: integer
          description: "性别：0=未知，1=男，2=女"
          enum: [0, 1, 2]
          example: 1
        phoneNumber:
          type: string
          description: 手机号码
          example: "13800138000"
        email:
          type: string
          description: 企业邮箱
          nullable: true
          example: "zhangsan@company.com"
        jobTitle:
          type: string
          description: 职位名称
          nullable: true
          example: "仓管员"
        departmentId:
          type: integer
          format: int64
          description: 所属部门 ID
          nullable: true
          example: 1
        departmentName:
          type: string
          description: 所属部门名称（关联查询，前端展示用）
          nullable: true
          example: "一号仓库"
        hidePhoneNumber:
          type: boolean
          description: 是否隐藏手机号
          example: false
        hideName:
          type: boolean
          description: 是否隐藏姓名
          example: false
        remark:
          type: string
          description: 管理员备注
          nullable: true
          example: "2026年春季入职"
        status:
          type: integer
          description: "账号状态：0=禁用，1=启用"
          enum: [0, 1]
          example: 1
        createdAt:
          type: string
          format: date-time
          description: 创建时间
          example: "2026-04-22T10:00:00"
        updatedAt:
          type: string
          format: date-time
          description: 更新时间
          example: "2026-04-22T10:00:00"
        createdBy:
          type: integer
          format: int64
          description: 创建人 ID
          nullable: true
          example: 1
        updatedBy:
