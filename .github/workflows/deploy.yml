name: Build and Deploy

# push 到 main 且改动了后端/前端/部署文件时触发；也可在 Actions 页手动触发。
on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'web/**'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  IMAGE_API: ghcr.io/qingshan2039/ai_store_manage-api
  IMAGE_WEB: ghcr.io/qingshan2039/ai_store_manage-web

jobs:
  build:
    name: 构建并推送镜像到 GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 API 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建并推送 Web 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: SSH 到 VPS 拉取并重启
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 通过 SSH 部署
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' bash -s" <<'EOF'
          set -e
          # CI 临时登录 GHCR 拉私有镜像（GITHUB_TOKEN 随 job 失效）
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          cd /opt/ai-store-manage/app
          # 与仓库强一致（VPS 不应有本地改动；.env 等 untracked 文件不受影响）
          git fetch origin --quiet
          git reset --hard origin/main
          cd deploy
          docker compose -f docker-compose.prod.yml --env-file .env pull
          docker compose -f docker-compose.prod.yml --env-file .env up -d
          # nginx 配置是挂载文件，up 不会自动重载；显式 reload（失败则重启）
          docker compose -f docker-compose.prod.yml --env-file .env exec -T nginx nginx -s reload \
            || docker compose -f docker-compose.prod.yml --env-file .env restart nginx
          docker logout ghcr.io
          docker image prune -f
          echo "--- 容器状态 ---"
          docker compose -f docker-compose.prod.yml ps
          EOF
