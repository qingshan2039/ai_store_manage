# 测试环境配置
# 连接 dev PostgreSQL 容器（ai-store-pg:5433）内的独立测试库 ai_store_test（与 dev 业务库隔离），
# Flyway 在该测试库上自动迁移；其余配置继承 application.yml。
spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ai_store_test
    username: ${POSTGRES_USER:ai_store}
    password: ${POSTGRES_PASSWORD:ai_store_pwd}

logging:
  level:
    root: WARN
    com.aistore: DEBUG
