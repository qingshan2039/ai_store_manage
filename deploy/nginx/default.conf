# 外层反向代理（HTTPS）。证书由 certbot 签发后启用。
# 全新机器首次部署、证书尚未签发时，先用 default.bootstrap.conf（纯 HTTP）跑通 + 签证书，再切回本文件。
upstream api_backend {
    server api:8080;
}
upstream web_backend {
    server web:80;
}

# 80：ACME 续期验证 + 全量跳转 HTTPS
server {
    listen 80;
    server_name hpclaw.org www.hpclaw.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 443：HTTPS 终结
server {
    listen 443 ssl;
    http2  on;
    server_name hpclaw.org www.hpclaw.org;

    ssl_certificate     /etc/letsencrypt/live/hpclaw.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hpclaw.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-Frame-Options           "SAMEORIGIN"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # 后端 API（含文件上传 10MB 上限）
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # 前端静态
    location / {
        proxy_pass         http://web_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
