# 生产部署：从 GHCR 拉取 CI 构建好的镜像运行（不在 VPS 上 build）。
# 配合 .github/workflows/deploy.yml：push main → CI 构建并推 GHCR → SSH 到本机 pull + up。
# 与 docker-compose.yml（本地 build 版）的差异：
#   1) api/web 用 image 而非 build；
#   2) nginx 端口绑公网 IP（${PUBLIC_IP}），避开 Tailscale 占用的 443；
#   3) 1GB 小机：JVM 降配 + postgres 调小内存。
name: ai-store-manage

services:
  postgres:
    image: postgres:16-alpine
    container_name: asm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    # 1GB 小机：调小 shared_buffers、限制连接数，给应用让出内存
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=64MB"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "effective_cache_size=256MB"
    volumes:
      - /opt/ai-store-manage/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - asm-net

  api:
    image: ghcr.io/qingshan2039/ai_store_manage-api:${IMAGE_TAG:-latest}
    container_name: asm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_UPLOAD_DIR: /app/uploads
      # 1GB 小机：堆压到 384MB，单核用 SerialGC（比 G1 省内存/省 CPU）
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseSerialGC -Duser.timezone=Asia/Shanghai"
    volumes:
      - /opt/ai-store-manage/logs:/app/logs
      - /opt/ai-store-manage/data/uploads:/app/uploads
    networks:
      - asm-net

  web:
    image: ghcr.io/qingshan2039/ai_store_manage-web:${IMAGE_TAG:-latest}
    container_name: asm-web
    restart: unless-stopped
    networks:
      - asm-net

  nginx:
    image: nginx:1.27-alpine
    container_name: asm-nginx
    restart: unless-stopped
    ports:
      # 绑公网 IP，避开 Tailscale 在 <tailscale-ip>:443 的占用（0.0.0.0:443 会与之冲突）
      - "${PUBLIC_IP}:80:80"
      - "${PUBLIC_IP}:443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/ai-store-manage/data/certbot/conf:/etc/letsencrypt:ro
      - /opt/ai-store-manage/data/certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - web
    networks:
      - asm-net

  certbot:
    image: certbot/certbot:latest
    container_name: asm-certbot
    restart: unless-stopped
    volumes:
      - /opt/ai-store-manage/data/certbot/conf:/etc/letsencrypt
      - /opt/ai-store-manage/data/certbot/www:/var/www/certbot
    # 启动后每 12 小时尝试一次 renew；首次签发见 docs/deploy.md 第 8 节
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - asm-net

networks:
  asm-net:
    driver: bridge
