spring:
  # 使用 H2 内存数据库，替代 MySQL，保证 CI/单元测试无需真实数据库连接
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # 关闭 Spring Security 自动配置，避免 test context 拉取额外 bean（可选）
  # 如需保留 Security Bean，删除以下两行
  # autoconfigure:
  #   exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# MyBatis-Plus 在 H2 MODE=MySQL 下兼容性良好，无需额外配置
mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    root: WARN
    com.aistore: DEBUG
