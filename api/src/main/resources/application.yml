server:
  port: 8080

spring:
  application:
    name: ai-store-manage-api

  # Flyway 数据库迁移：启动时按 classpath:db/migration 下的版本化脚本自动建表 / 演进
  # baseline-on-migrate：对“已有表但无 Flyway 历史”的库先建立基线再迁移，避免首次报错
  flyway:
    enabled: true
    baseline-on-migrate: true

  # PostgreSQL DataSource
  datasource:
    url: jdbc:postgresql://localhost:5433/ai_store_manage
    username: ${POSTGRES_USER:ai_store}
    password: ${POSTGRES_PASSWORD:ai_store_pwd}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Jackson configuration
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus configuration
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.aistore.module.user.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Logging configuration
logging:
  level:
    root: INFO
    com.aistore: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
