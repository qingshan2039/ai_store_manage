    DepartmentType:
      type: string
      description: |
        部门类型枚举：
        - `WAREHOUSE` 仓管
        - `TRANSPORT` 运输
        - `SALES` 销售
        - `PRODUCTION` 生产
        - `OFFICE` 办公（Office）
        - `HR` 人事
        - `FINANCE` 财务
        - `MANAGEMENT` 管理（管理层 / 老板层级）
      enum:
        - WAREHOUSE
        - TRANSPORT
        - SALES
        - PRODUCTION
        - OFFICE
        - HR
        - FINANCE
        - MANAGEMENT
      example: WAREHOUSE

    CreateDepartmentRequest:
      type: object
      description: 创建部门请求体
      required:
        - name
        - code
        - type
      properties:
        name:
          type: string
          description: 部门名称（全局唯一）
          minLength: 2
          maxLength: 64
          example: "一号仓库"
        code:
          type: string
          description: 部门编码（创建后不可修改，全局唯一）
          minLength: 2
          maxLength: 32
          pattern: '^[A-Za-z0-9\-]+$'
          example: "WH-01"
        type:
          allOf:
            - $ref: '#/components/schemas/DepartmentType'
          description: 部门类型
        sort:
          type: integer
          description: 显示排序（升序，越小越靠前）
          default: 0
          example: 1
        remark:
          type: string
          description: 备注
          maxLength: 500
          example: "主仓库，存放快消品"
        status:
          type: integer
          description: "部门状态：0=禁用，1=启用"
          enum: [0, 1]
          default: 1
          example: 1

